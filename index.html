<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Familoo - Family Calendar</title>
  <meta name="description" content="Familoo - The simple and ethical family calendar. Share events, sync schedules, keep everyone in the loop.">
  <script>
    (function() {
      const base = '/';
      const lang = (navigator.language || navigator.userLanguage || 'en').toLowerCase();

      if (lang.startsWith('fr'))           { window.location.replace(base + 'fr/'); }
      else if (lang.startsWith('de'))      { window.location.replace(base + 'de/'); }
      else if (lang.startsWith('es-419') ||
               lang === 'es-mx' ||
               lang === 'es-ar' ||
               lang === 'es-co') {
                                             window.location.replace(base + 'es-latam/'); }
      else if (lang.startsWith('es'))      { window.location.replace(base + 'es/'); }
      else if (lang.startsWith('it'))      { window.location.replace(base + 'it/'); }
      else if (lang.startsWith('nl'))      { window.location.replace(base + 'nl/'); }
      else if (lang === 'pt-br')           { window.location.replace(base + 'pt-br/'); }
      else if (lang.startsWith('pt'))      { window.location.replace(base + 'pt/'); }
      else                                 { window.location.replace(base + 'en/'); }
    })();
  </script>
  <!-- Fallback si JS désactivé -->
  <noscript>
    <meta http-equiv="refresh" content="0; url=/en/">
  </noscript>
</head>
<body>
  <p>Redirecting to Familoo...</p>
</body>
</html>
